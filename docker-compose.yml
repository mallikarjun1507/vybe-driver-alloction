version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: vybe_postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: vybe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - vybe_network

  redis:
    image: redis:7
    container_name: vybe_redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - vybe_network

networks:
  vybe_network:

volumes:
  postgres_data: